<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Job - JobConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        JobConnect
    </div>

    <div class="container">

        <h2>Apply for Job</h2>

        <input type="text" placeholder="Full Name">

        <input type="email" placeholder="Email Address">

        <input type="tel" placeholder="Phone Number">

        <input type="text" placeholder="Highest Qualification">

        <input type="text" placeholder="Skills">

        <label><strong>Upload Resume</strong></label>
        <input type="file">

        <textarea placeholder="Cover Letter (Optional)" rows="5"></textarea>

        <button class="btn" onclick="applyJob()">Submit Application</button>

        <br><br>

        <a href="job-details.html">
            <button class="btn">Back</button>
        </a>

    </div>

</body>
</html>
