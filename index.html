<!DOCTYPE html>
<html>
<head>
<title>JobConnect</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#0A66C2;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#0A66C2;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
}

p{
    text-align:center;
}
</style>

</head>

<body>

<div class="header">
JobConnect
</div>

<div class="container">

<h2>Login</h2>
<input type="text" id="username" placeholder="username">
<input type="password" id="password" placeholder="Password">

<button  onclick="login()">Login</button>
<p><a href="Signup.html">
<h3>Recommended Jobs</h3>

<ul id="jobList"></ul>

<h3>Match Score</h3>
<p id="score">0%</p>

<div style="margin-top:10px;">
    <input type="file" id="resume" accept=".pdf,.doc,.docx">
    <button onclick="analyzeResume()" style="margin-top:10px;">Analyze Resume</button>
</div>

<script>
let category = "Web Developer";

let jobs = {
    "Web Developer": [
        "Frontend Developer - Infosys",
        "Web Developer - TCS",
        "UI Developer - Wipro"
    ]
};

let jobList = document.getElementById("jobList");

jobs[category].forEach(function(job){
    let li = document.createElement("li");
    li.innerHTML = job;
    jobList.appendChild(li);
});

function analyzeResume(){
    let fileInput = document.getElementById("resume");
    if(!fileInput || fileInput.files.length === 0){
        alert("Please upload your resume");
        return;
    }
    document.getElementById("score").innerHTML = "92%";
    alert("Resume analyzed successfully!");
}
</script>

<h3>Skills Detected</h3>

<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
<li>Python</li>
</ul>
<script>

function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (username !== "" && password !== "") {

        alert("Login successful!");
        window.location.href = "home.html";

    } else {

        alert("Please enter username and password.");

    }

}

</script>

</script>
</body>
</html>
