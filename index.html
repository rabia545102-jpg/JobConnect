<!DOCTYPE html>
<html>
<head>
<title>JobConnect</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#0A66C2;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#0A66C2;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
}

p{
    text-align:center;
}
</style>

</head>

<body>

<div class="header">
JobConnect
</div>

<div class="container">

<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
<p><a href="Signup.html">Create New Account</a></p>
</div>
<script src="script.js"></script>
</body>
</html>
