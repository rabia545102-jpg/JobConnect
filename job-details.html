<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h2>JobConnect</h2>
</div>

<div class="container">

    <h2 id="jobTitle"></h2>

    <p><b>Company:</b> <span id="company"></span></p>
    <p><b>Location:</b> <span id="location"></span></p>
    <p><b>Salary:</b> ₹6 LPA</p>
    <p><b>Experience:</b> 0-2 Years</p>
    <p><b>Description:</b> Looking for a candidate with basic knowledge of HTML, CSS and JavaScript.</p>

    <button class="btn" onclick="applyJob()">
        Apply Now
    </button>

    <button class="btn" onclick="saveJob()">
        Save Job
    </button>

    <br><br>

    <button class="btn" onclick="window.location.href='home.html'">
        Back to Home
    </button>
</div>

<script>

document.getElementById("jobTitle").innerHTML =
localStorage.getItem("jobTitle") || "Software Developer";

document.getElementById("company").innerHTML =
localStorage.getItem("jobCompany") || "ABC Technologies";

document.getElementById("location").innerHTML =
localStorage.getItem("jobLocation") || "Hyderabad";

function applyJob() {
    alert("Application submitted successfully!");
}

function saveJob(){

    let title = document.getElementById("jobTitle").innerText;
    let company = document.getElementById("company").innerText;

    let job = title + " - " + company;

    let savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];

    savedJobs.push(job);

    localStorage.setItem("savedJobs", JSON.stringify(savedJobs));

    alert("Job saved successfully!");

}

</script>

</body>
</html>
