<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Jobs - JobConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>JobConnect</h1>
</div>

<div class="container">

    <h2>Saved Jobs</h2>

    <div class="job-card">
        <h3 id="savedJobTitle">No Saved Jobs</h3>

        <button class="btn" onclick="viewJob()">
            View Details
        </button>

        <button class="btn" onclick="removeJob()">
            Remove
        </button>
    </div>

    <br>

    <button class="btn" onclick="window.location.href='home.html'">
        Back to Home
    </button>

</div>

<script>

let savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];

let jobContainer = document.getElementById("savedJobTitle");

if(savedJobs.length > 0){

    jobContainer.innerHTML = "";

    savedJobs.forEach(function(job){

        let p = document.createElement("p");
        p.innerHTML = job;
        jobContainer.appendChild(p);

    });

}
else{

    jobContainer.innerHTML = "No Saved Jobs";

}


function removeJob(){

    localStorage.removeItem("savedJobs");

    document.getElementById("savedJobTitle").innerHTML = "No Saved Jobs";

    alert("All saved jobs removed!");

}
</script>

</body>
</html>
