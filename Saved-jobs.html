<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Jobs - JobConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>JobConnect</h1>
</div>

<div class="container">

    <h2>Saved Jobs</h2>

    <div class="job-card">
        <h3 id="savedJobTitle">No Saved Jobs</h3>

        <button class="btn" onclick="viewJob()">
            View Details
        </button>

        <button class="btn" onclick="removeJob()">
            Remove
        </button>
    </div>

    <br>

    <button class="btn" onclick="window.location.href='home.html'">
        Back to Home
    </button>

</div>

<script>

let savedJob = localStorage.getItem("savedJob");

if(savedJob){
    document.getElementById("savedJobTitle").innerHTML = savedJob;
}
else{
    document.getElementById("savedJobTitle").innerHTML = "No Saved Jobs";
}

function viewJob(){

    if(localStorage.getItem("savedJob")){
        window.location.href="job-details.html";
    }
    else{
        alert("No saved jobs available.");
    }

}

function removeJob(){

    if(localStorage.getItem("savedJob")){

        localStorage.removeItem("savedJob");
        document.getElementById("savedJobTitle").innerHTML="No Saved Jobs";
        alert("Job removed successfully!");

    }
    else{

        alert("No saved jobs to remove.");

    }

}

</script>

</body>
</html>
